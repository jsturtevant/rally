name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bless_snapshots:
        description: 'Bless new baseline snapshots'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run E2E tests
        id: e2e
        run: npm run test:e2e
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: ${{ inputs.bless_snapshots == true }}

      - name: Bless snapshots
        if: inputs.bless_snapshots == true
        run: |
          npm run test:e2e -- --update-snapshots
          if [ -n "$(git status --porcelain test/baselines/)" ]; then
            git add test/baselines/
            git commit -m "chore: bless visual regression baselines

            Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
          else
            echo "No baseline changes to commit"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-diffs
          path: |
            test/actual/
            test/diffs/
          retention-days: 7

      - name: Comment on PR with snapshot instructions
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = `### 📸 Visual Regression Failed

            Some E2E snapshots differ from baselines. To review:

            1. Download the \`visual-diffs\` artifact from this workflow run
            2. Compare images in \`test/actual/\` vs \`test/baselines/\`
            3. Review diff images in \`test/diffs/\`

            **To bless new baselines:**
            - Re-run this workflow with "Bless new baseline snapshots" checked, or
            - Locally run: \`npm run test:e2e -- --update-snapshots\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if tests failed (non-blessing mode)
        if: steps.e2e.outcome == 'failure' && inputs.bless_snapshots != true
        run: exit 1
